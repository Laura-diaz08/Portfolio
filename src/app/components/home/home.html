@if (personalInfo) {
  <div class="home-container">
    
    <img src="assets/images/foto perfil.jpg" alt="Foto de Laura" class="profile-img">

    <h1>¡Hola! Soy <span class="highlight">{{ personalInfo.name }}</span></h1>
    <h2>{{ personalInfo.role }}</h2>
    <p>{{ personalInfo.description }}</p>
  </div>
} @else {
  <p class="loading">Cargando perfil...</p>
}
