@if (personalInfo) {
  <div class="hero-container">
    
    <div class="hero-content">
      <span class="greeting">¡Hola a todos!</span>
      <h1>Soy <span class="highlight">{{ personalInfo.name }}</span></h1>
      <h2 class="role-text">{{ personalInfo.role }}</h2>
      <p class="description">{{ personalInfo.description }}</p>

      <div class="hero-actions">
        <a routerLink="/projects" class="modern-btn">
          Ver mis proyectos <i class="fa-solid fa-arrow-right"></i>
        </a>
        
        <div class="social-links">
          <a href="https://github.com/Laura_diaz08" target="_blank" title="GitHub"><i class="fa-brands fa-github"></i></a>
        </div>
      </div>
    </div>

    <div class="hero-image-wrapper">
      <div class="image-backdrop"></div> <img src="assets/images/foto perfil.jpg" alt="Foto de {{ personalInfo.name }}" class="profile-img">
    </div>

  </div>
} @else {
  <p class="loading">Cargando perfil...</p>
}
